<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#93a4b8"/>
    </marker>
    <marker id="arrT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3ee8c5"/>
    </marker>
    <style>
      .panel{fill:#131c2b;stroke:#2a3a52;stroke-width:1.5;rx:12}
      text{fill:#e6edf3}
      .t{font-weight:700}
      .mut{fill:#93a4b8}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
      .chip{fill:#0f1826;stroke:#2a3a52;stroke-width:1.2}
    </style>
  </defs>

  <rect x="0" y="0" width="1080" height="700" rx="16" fill="#0d1117"/>
  <text x="40" y="50" font-size="24" class="t">backlog-grinder</text>
  <text x="40" y="76" font-size="14" class="mut">A loop-engineering harness — drain a finite backlog against a real git repo behind a hybrid checker.</text>

  <!-- INPUTS -->
  <text x="40" y="118" font-size="12" class="mut t">INPUTS</text>
  <rect x="40" y="130" width="210" height="86" rx="11" fill="#16202e" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="60" y="162" font-size="15" class="t mono">BACKLOG.md</text>
  <text x="60" y="184" font-size="12.5" class="mut">a finite list of findings</text>
  <text x="60" y="202" font-size="12.5" class="mut">severity · path · suggested fix</text>

  <rect x="40" y="248" width="210" height="86" rx="11" fill="#16202e" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="60" y="280" font-size="15" class="t">Target git repo</text>
  <text x="60" y="302" font-size="12.5" class="mut">any language with a test</text>
  <text x="60" y="320" font-size="12.5" class="mut">command that emits coverage</text>

  <rect x="40" y="366" width="210" height="86" rx="11" fill="#16202e" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="60" y="398" font-size="15" class="t">implementerCmd</text>
  <text x="60" y="420" font-size="12.5" class="mut">any shell command:</text>
  <text x="60" y="438" font-size="12.5" class="mut">LLM CLI · script · sed</text>

  <!-- CORE -->
  <rect x="296" y="104" width="486" height="496" rx="14" class="panel" fill="#131c2b" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="316" y="132" font-size="14" class="t" fill="#3ee8c5">backlog-grinder · pure core (dependency-injected)</text>

  <rect x="320" y="148" width="438" height="58" rx="10" fill="#18222f" stroke="#33455f"/>
  <text x="338" y="174" font-size="14" class="t">parse → triage</text>
  <text x="338" y="194" font-size="12" class="mut">parks stale items · writes STATE.md (human triage view)</text>

  <rect x="320" y="222" width="438" height="48" rx="10" fill="#18222f" stroke="#33455f"/>
  <text x="338" y="251" font-size="14" class="t">driver — drain the queue, one item at a time</text>

  <!-- hybrid checker -->
  <rect x="320" y="288" width="438" height="184" rx="10" fill="#0f1826" stroke="#33455f"/>
  <text x="338" y="312" font-size="13" class="t" fill="#f0b429">hybrid checker — every attempt must pass all four</text>

  <rect x="338" y="326" width="92" height="62" rx="9" class="chip"/>
  <text x="384" y="352" font-size="13" class="t" text-anchor="middle">gate</text>
  <text x="384" y="372" font-size="10.5" class="mut" text-anchor="middle">tests green</text>

  <text x="441" y="362" font-size="18" class="mut" text-anchor="middle">∧</text>

  <rect x="452" y="326" width="118" height="62" rx="9" class="chip" stroke="#3ee8c5"/>
  <text x="511" y="350" font-size="12.5" class="t" text-anchor="middle" fill="#3ee8c5">coverage-of-</text>
  <text x="511" y="366" font-size="12.5" class="t" text-anchor="middle" fill="#3ee8c5">change</text>
  <text x="511" y="381" font-size="10" class="mut" text-anchor="middle">a test ran the lines</text>

  <text x="581" y="362" font-size="18" class="mut" text-anchor="middle">∧</text>

  <rect x="592" y="326" width="74" height="62" rx="9" class="chip"/>
  <text x="629" y="350" font-size="12.5" class="t" text-anchor="middle">scope</text>
  <text x="629" y="366" font-size="12.5" class="t" text-anchor="middle">guards</text>
  <text x="629" y="381" font-size="10" class="mut" text-anchor="middle">no tamper</text>

  <text x="677" y="362" font-size="18" class="mut" text-anchor="middle">∧</text>

  <rect x="688" y="326" width="56" height="62" rx="9" class="chip"/>
  <text x="716" y="352" font-size="12.5" class="t" text-anchor="middle">verifier</text>
  <text x="716" y="372" font-size="10" class="mut" text-anchor="middle">optional</text>

  <text x="338" y="420" font-size="12" class="mut">flake-checked gate (a red is re-run once) · couldn't-run → park, no attempt spent</text>
  <rect x="338" y="432" width="402" height="30" rx="8" fill="#10261f" stroke="#1f5d46"/>
  <text x="346" y="452" font-size="11.5" fill="#7ee2b8">guarantee: a behaviour change cannot commit unless a test executed the changed lines.</text>

  <!-- adapters strip -->
  <rect x="320" y="486" width="438" height="98" rx="10" fill="#101a27" stroke="#33455f"/>
  <text x="338" y="508" font-size="12.5" class="t" fill="#6cb6ff">real adapters — I/O injected at the edges</text>
  <g font-size="11.5" class="mut">
    <rect x="338" y="520" width="96" height="50" rx="8" class="chip"/><text x="386" y="540" class="t" fill="#e6edf3" font-size="12" text-anchor="middle">git</text><text x="386" y="557" text-anchor="middle">commit · revert</text>
    <rect x="444" y="520" width="118" height="50" rx="8" class="chip"/><text x="503" y="540" class="t" fill="#e6edf3" font-size="12" text-anchor="middle">coverage</text><text x="503" y="557" text-anchor="middle">lcov · cobertura</text>
    <rect x="572" y="520" width="100" height="50" rx="8" class="chip"/><text x="622" y="540" class="t" fill="#e6edf3" font-size="12" text-anchor="middle">implementer</text><text x="622" y="557" text-anchor="middle">shell · LLM</text>
    <rect x="682" y="520" width="58" height="50" rx="8" class="chip"/><text x="711" y="540" class="t" fill="#e6edf3" font-size="12" text-anchor="middle">persist</text><text x="711" y="557" text-anchor="middle">state</text>
  </g>

  <!-- OUTCOMES -->
  <text x="828" y="118" font-size="12" class="mut t">OUTCOME PER ITEM</text>
  <rect x="828" y="148" width="216" height="118" rx="11" fill="#10261f" stroke="#2f7f5e" stroke-width="1.5"/>
  <text x="848" y="178" font-size="15" class="t" fill="#56d364">✓ all four pass</text>
  <text x="848" y="206" font-size="13">commit the change</text>
  <text x="848" y="228" font-size="12.5" class="mut mono">+ provenance.jsonl</text>
  <text x="848" y="248" font-size="12.5" class="mut">audit record per commit</text>

  <rect x="828" y="298" width="216" height="150" rx="11" fill="#2a1518" stroke="#8a3b3b" stroke-width="1.5"/>
  <text x="848" y="328" font-size="15" class="t" fill="#ff7b72">✗ anything fails</text>
  <text x="848" y="354" font-size="12.5" class="mut mono">git reset --hard HEAD</text>
  <text x="848" y="372" font-size="12.5" class="mut mono">git clean -fd</text>
  <text x="848" y="396" font-size="13">feedback → next attempt</text>
  <text x="848" y="418" font-size="12.5" class="mut">repeat / max → abandon</text>

  <!-- arrows -->
  <g fill="none" stroke="#93a4b8" stroke-width="1.6">
    <path d="M250 173 H296" marker-end="url(#arr)"/>
    <path d="M250 291 H296" marker-end="url(#arr)"/>
    <path d="M250 409 C272 409 274 300 296 300" marker-end="url(#arr)"/>
    <path d="M782 200 H828" marker-end="url(#arr)"/>
    <path d="M782 360 H828" marker-end="url(#arr)"/>
  </g>
  <!-- retry loop back -->
  <path d="M828 430 C700 470 660 280 758 252" fill="none" stroke="#f0b429" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="624" y="486" font-size="11" fill="#f0b429" font-style="italic" text-anchor="middle"></text>

  <!-- internal arrows -->
  <g fill="none" stroke="#3ee8c5" stroke-width="1.4">
    <path d="M539 206 V222" marker-end="url(#arrT)"/>
    <path d="M539 270 V288" marker-end="url(#arrT)"/>
  </g>

  <text x="40" y="640" font-size="12.5" class="mut">Model-agnostic: the implementer is a shell command you choose, so no model is hardcoded — and no LLM is required at all.</text>
  <text x="40" y="662" font-size="12.5" class="mut">Pure core + injected adapters → the same decision logic is unit-tested without git, a network, or a real model.</text>
</svg>
